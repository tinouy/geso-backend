name: Test Dispatch 3

on:
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      image_tags:
        description: 'Tags separados por coma'
        required: true
        default: 'latest,latest-stable'
      target:
        description: 'Build target'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - dev

env:
  IMAGE: tinouy/geso-backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags and target
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
          INPUT_IMAGE_TAGS: ${{ inputs.image_tags }}
          INPUT_TARGET: ${{ inputs.target }}
        run: |
          echo "target=prod" >> "$GITHUB_OUTPUT"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "tinouy/geso-backend:latest" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          target: ${{ steps.meta.outputs.target }}
          no-cache: true
