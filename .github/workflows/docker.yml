name: Docker Build & Push

on:
  push:
    branches:
      - main
      - develop
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target (prod o dev)'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - dev
      tags:
        description: 'Tags a publicar (separados por coma, ej: latest,latest-stable,1.0.3)'
        required: true
        default: 'latest,latest-stable'

env:
  IMAGE: tinouy/geso-backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags and target
        id: meta
        run: |
          IMAGE="${{ env.IMAGE }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET="${{ inputs.target }}"
            {
              echo "tags<<EOF"
              echo "${{ inputs.tags }}" | tr ',' '\n' | sed "s|^|${IMAGE}:|"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "target=${TARGET}" >> "$GITHUB_OUTPUT"

          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            NEW_TAG="${GITHUB_REF#refs/tags/}"

            LATEST_VER=$(curl -sf "https://hub.docker.com/v2/repositories/${IMAGE}/tags?page_size=100" \
              | python3 -c "
import sys, json, re
data = json.load(sys.stdin)
tags = [t['name'] for t in data.get('results', []) if re.match(r'^\d+\.\d+\.\d+$', t['name'])]
print(max(tags, key=lambda v: tuple(int(x) for x in v.split('.'))) if tags else '0.0.0')
" || echo "0.0.0")

            IS_NEWER=$(python3 -c "
new = tuple(int(x) for x in '${NEW_TAG}'.split('.'))
cur = tuple(int(x) for x in '${LATEST_VER}'.split('.'))
print('true' if new > cur else 'false')
")

            if [ "$IS_NEWER" = "true" ]; then
              {
                echo "tags<<EOF"
                echo "${IMAGE}:${NEW_TAG}"
                echo "${IMAGE}:latest"
                echo "${IMAGE}:latest-stable"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
            else
              {
                echo "tags<<EOF"
                echo "${IMAGE}:${NEW_TAG}"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
            fi
            echo "target=prod" >> "$GITHUB_OUTPUT"

          elif [[ "$GITHUB_REF" == refs/heads/develop ]]; then
            {
              echo "tags<<EOF"
              echo "${IMAGE}:test"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "target=dev" >> "$GITHUB_OUTPUT"

          else
            {
              echo "tags<<EOF"
              echo "${IMAGE}:latest"
              echo "${IMAGE}:latest-stable"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "target=prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          target: ${{ steps.meta.outputs.target }}
          no-cache: true
