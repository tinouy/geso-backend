name: Docker Build & Push

on:
  push:
    branches:
      - main
      - develop
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      image_tags:
        description: 'Tags separados por coma (ej: latest,latest-stable,1.0.3)'
        required: true
        default: 'latest,latest-stable'
      target:
        description: 'Build target'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - dev

env:
  IMAGE: tinouy/geso-backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags and target
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
          INPUT_IMAGE_TAGS: ${{ inputs.image_tags }}
          INPUT_TARGET: ${{ inputs.target }}
        run: |
          set -e
          IMAGE="${{ env.IMAGE }}"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TARGET="${INPUT_TARGET:-prod}"
            {
              echo "tags<<EOF"
              echo "$INPUT_IMAGE_TAGS" | tr ',' '\n' | sed "s|^|${IMAGE}:|"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "target=${TARGET}" >> "$GITHUB_OUTPUT"

          elif [[ "$GIT_REF" == refs/tags/* ]]; then
            NEW_TAG="${GIT_REF#refs/tags/}"

            LATEST_VER=$(curl -sf "https://hub.docker.com/v2/repositories/${IMAGE}/tags?page_size=100" \
              | jq -r '[.results[].name | select(test("^[0-9]+[.][0-9]+[.][0-9]+$"))] | sort_by(split(".") | map(tonumber)) | last // "0.0.0"' \
              || echo "0.0.0")

            if [ "$NEW_TAG" != "$LATEST_VER" ] && printf '%s\n%s\n' "$LATEST_VER" "$NEW_TAG" | sort -V -C; then
              IS_NEWER="true"
            else
              IS_NEWER="false"
            fi

            if [ "$IS_NEWER" = "true" ]; then
              { echo "tags<<EOF"; echo "${IMAGE}:${NEW_TAG}"; echo "${IMAGE}:latest"; echo "${IMAGE}:latest-stable"; echo "EOF"; } >> "$GITHUB_OUTPUT"
            else
              { echo "tags<<EOF"; echo "${IMAGE}:${NEW_TAG}"; echo "EOF"; } >> "$GITHUB_OUTPUT"
            fi
            echo "target=prod" >> "$GITHUB_OUTPUT"

          elif [[ "$GIT_REF" == refs/heads/develop ]]; then
            { echo "tags<<EOF"; echo "${IMAGE}:test"; echo "EOF"; } >> "$GITHUB_OUTPUT"
            echo "target=dev" >> "$GITHUB_OUTPUT"

          else
            { echo "tags<<EOF"; echo "${IMAGE}:latest"; echo "${IMAGE}:latest-stable"; echo "EOF"; } >> "$GITHUB_OUTPUT"
            echo "target=prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          target: ${{ steps.meta.outputs.target }}
          no-cache: true
